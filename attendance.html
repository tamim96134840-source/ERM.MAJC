<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance – School ERP</title>
  <link rel="stylesheet" href="style.css">
  <style id="page-loader-style">
    #page-loader {
      position: fixed; inset: 0; background: #1a2744;
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; flex-direction: column; gap: 16px;
      transition: opacity 0.3s ease;
    }
    #page-loader .pl-spin {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #f5a623;
      border-radius: 50%;
      animation: pl-spin 0.7s linear infinite;
    }
    #page-loader .pl-text {
      color: rgba(255,255,255,0.6);
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 0.85rem; font-weight: 600;
    }
    @keyframes pl-spin { to { transform: rotate(360deg); } }
  </style>

  <style id="fallback-css">
    /* Emergency fallback — ensures pages render if style.css path fails */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#1a2744;--accent:#f5a623;--accent-2:#27ae60;--accent-3:#e74c3c;--surface:#f0f4ff;--surface-2:#e8edf8;--bg:#f5f7ff;--border:#dde3f0;--border-2:#c8d0e8;--text:#1a2744;--text-muted:#6b7a99;--card:#fff;--sidebar-w:260px;--topbar-h:64px;--shadow:0 2px 12px rgba(26,39,68,.08);--shadow-md:0 4px 20px rgba(26,39,68,.11);--shadow-lg:0 8px 32px rgba(26,39,68,.15);--radius:14px;--radius-sm:9px;--transition:all .18s ease}
    html{-webkit-text-size-adjust:100%}
    body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
    img{max-width:100%;display:block}
    a{color:var(--primary);text-decoration:none}
    button{font-family:inherit}
    input,select,textarea{font-family:inherit;outline:none}
    /* Layout */
    .app-layout{display:flex;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#1a2744,#0f1829);color:#fff;display:flex;flex-direction:column;z-index:1000;overflow-y:auto;transition:transform .28s ease;box-shadow:4px 0 24px rgba(0,0,0,.18)}
    .main-content{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;transition:margin-left .28s ease}
    .topbar{position:sticky;top:0;height:var(--topbar-h);background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;z-index:900;box-shadow:0 2px 10px rgba(26,39,68,.06)}
    .page-content{flex:1;padding:24px;max-width:1400px;width:100%}
    .sidebar-header{display:flex;align-items:center;gap:12px;padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
    .sidebar-logo{width:48px;height:48px;object-fit:contain;border-radius:12px;background:rgba(255,255,255,.1);padding:4px;flex-shrink:0}
    .sidebar-school-name{font-size:.82rem;font-weight:800;line-height:1.3;color:#fff}
    .sidebar-school-tagline{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:2px;font-style:italic}
    .sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
    .nav-section-label{font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:14px 8px 6px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,.72);font-size:.88rem;font-weight:500;cursor:pointer;transition:var(--transition);text-decoration:none;white-space:nowrap}
    .nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
    .nav-item.active{background:rgba(245,166,35,.18);color:var(--accent);font-weight:700}
    .nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
    .sidebar-footer{padding:14px 14px 18px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
    .sidebar-user{display:flex;align-items:center;gap:10px}
    .sidebar-user-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;flex-shrink:0;overflow:hidden}
    .sidebar-user-name{font-size:.82rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sidebar-user-role{font-size:.7rem;color:rgba(255,255,255,.45)}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
    /* Topbar */
    .menu-toggle{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--primary);padding:6px;border-radius:8px}
    .topbar-title{flex:1;font-size:1rem;font-weight:700;color:var(--primary)}
    .topbar-btn{width:38px;height:38px;border:none;background:var(--surface);border-radius:10px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
    /* Page header */
    .page-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .page-header-left h2{font-size:1.4rem;font-weight:800;color:var(--primary)}
    .page-header-left p{font-size:.85rem;color:var(--text-muted);margin-top:3px}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:var(--transition);position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--card-accent,var(--primary));border-radius:4px 0 0 4px}
    .stat-icon{width:48px;height:48px;border-radius:12px;background:var(--card-accent-bg,rgba(26,39,68,.08));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
    .stat-value{font-size:1.6rem;font-weight:800;color:var(--primary);line-height:1.1}
    .stat-label{font-size:.78rem;color:var(--text-muted);font-weight:500;margin-top:2px}
    .stat-change{font-size:.72rem;font-weight:600;margin-top:4px}
    .stat-change.up{color:var(--accent-2)}.stat-change.down{color:var(--accent-3)}
    /* Charts */
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:24px}
    .chart-card,.table-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
    .chart-card{padding:20px}
    .chart-card-title{font-size:.95rem;font-weight:700;color:var(--primary)}
    .chart-card-sub{font-size:.75rem;color:var(--text-muted);margin-top:2px}
    .chart-container{position:relative;height:220px}
    .table-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
    .table-card-title{font-size:.95rem;font-weight:700;color:var(--primary)}
    /* Table */
    .table-overflow{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .data-table{width:100%;border-collapse:collapse;min-width:500px}
    .data-table th{background:var(--surface);font-size:.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    .data-table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:middle}
    .data-table tr:last-child td{border-bottom:none}
    .data-table tbody tr:hover{background:var(--surface)}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border:1.5px solid transparent;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;text-decoration:none;line-height:1.3}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn-primary:hover{background:#243558}
    .btn-accent{background:var(--accent);color:var(--primary);border-color:var(--accent)}
    .btn-ghost{background:transparent;color:var(--primary);border-color:var(--border)}
    .btn-ghost:hover{background:var(--surface)}
    .btn-success{background:var(--accent-2);color:#fff}
    .btn-danger{background:var(--accent-3);color:#fff}
    .btn-sm{padding:6px 12px;font-size:.8rem;border-radius:7px}
    .btn-full{width:100%}
    .btn-icon{width:34px;height:34px;padding:0;border-radius:8px}
    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:700;white-space:nowrap}
    .badge-success{background:rgba(39,174,96,.12);color:#1a8a48}
    .badge-danger{background:rgba(231,76,60,.12);color:#b52d20}
    .badge-warning{background:rgba(245,166,35,.12);color:#b57a00}
    .badge-info{background:rgba(41,128,185,.12);color:#1a6090}
    .badge-neutral{background:var(--surface-2);color:var(--text-muted)}
    /* Forms */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .form-group label{font-size:.82rem;font-weight:700;color:var(--text-muted);letter-spacing:.02em}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    input[type=text],input[type=email],input[type=tel],input[type=number],input[type=password],input[type=date],input[type=time],select,textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--text);background:#fff;transition:var(--transition);width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,39,68,.1)}
    textarea{resize:vertical;min-height:90px}
    /* Modals */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
    .modal-title{font-size:1rem;font-weight:800;color:var(--primary)}
    .modal-close{width:32px;height:32px;background:var(--surface);border:none;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
    .modal-body{padding:20px 22px}
    .modal-footer{padding:14px 22px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
    /* Avatars */
    .avatar-cell{display:flex;align-items:center;gap:10px;min-width:0}
    .avatar-sm{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;flex-shrink:0}
    .avatar-name{font-weight:600;font-size:.88rem}
    .avatar-sub{font-size:.75rem;color:var(--text-muted)}
    /* Progress */
    .progress-bar{height:7px;background:var(--surface-2);border-radius:99px;overflow:hidden;flex:1}
    .progress-fill{height:100%;border-radius:99px;transition:width .6s ease}
    /* Toast */
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column-reverse;gap:10px;pointer-events:none;max-width:360px}
    .toast{display:flex;align-items:center;gap:12px;padding:13px 18px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.12);animation:toastIn .3s ease;pointer-events:all;min-width:240px}
    @keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
    .toast-icon{font-size:1.1rem;flex-shrink:0}.toast-msg{font-size:.85rem;font-weight:600;flex:1}
    .toast-success{border-left:4px solid var(--accent-2)}.toast-error{border-left:4px solid var(--accent-3)}.toast-warning{border-left:4px solid var(--accent)}
    /* Empty state */
    .empty-state{text-align:center;padding:48px 24px}
    .empty-state-icon{font-size:3rem;margin-bottom:14px;opacity:.6}
    .empty-state-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px}
    /* WA */
    .wa-bulk-bar{background:linear-gradient(135deg,#075E54,#128C7E);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;color:#fff;flex-wrap:wrap}
    .wa-send-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:#25D366;color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:var(--transition);white-space:nowrap}
    .wa-fee-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(39,174,96,.12);color:#1a8a48;border:1.5px solid rgba(39,174,96,.25);border-radius:8px;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:var(--transition)}
    /* Info card */
    .info-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:var(--transition)}
    .info-card-icon{font-size:2rem;margin-bottom:10px}
    .info-card-title{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:4px}
    .info-card-sub{font-size:.78rem;color:var(--text-muted);margin-top:3px}
    /* Tabs */
    .tab-bar{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:12px;margin-bottom:20px;flex-wrap:wrap}
    .tab-item{padding:8px 18px;border:none;border-radius:9px;background:transparent;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--text-muted);transition:var(--transition)}
    .tab-item.active{background:var(--primary);color:#fff}
    /* Announcement */
    .announcement-item{padding:14px 0;border-bottom:1px solid var(--border)}
    .announcement-item:last-child{border-bottom:none}
    .announcement-title{font-weight:700;font-size:.92rem;color:var(--primary);margin-bottom:5px}
    .announcement-body{font-size:.85rem;color:var(--text-muted);line-height:1.6;margin-bottom:8px}
    .announcement-meta{display:flex;gap:16px;font-size:.75rem;color:var(--text-light,#9aa5c0)}
    /* Fee row */
    .fee-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
    .fee-row-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .fee-row-name{font-size:.88rem;font-weight:600}.fee-row-date{font-size:.75rem;color:var(--text-muted)}.fee-row-amount{font-size:.95rem;font-weight:800}
    /* Search */
    .search-input-wrap{position:relative}.search-input-wrap input{padding-left:38px;width:220px}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--text-muted);pointer-events:none}
    /* Upload */
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:var(--transition);color:var(--text-muted);font-size:.85rem}
    .upload-area:hover{border-color:var(--primary);background:var(--surface)}
    .upload-icon{font-size:2rem;margin-bottom:8px}
    /* Responsive */
    @media(max-width:900px){
      .main-content{margin-left:0!important}
      .menu-toggle{display:flex!important}
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.25)}
      .sidebar-overlay.show{display:block}
      .page-content{padding:16px}
    }
    @media(max-width:600px){
      .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
      .stat-value{font-size:1.3rem}
      .stat-card{padding:14px 12px}
      .charts-grid{grid-template-columns:1fr}
      .form-row{grid-template-columns:1fr}
      .page-header{flex-direction:column;align-items:flex-start}
      .data-table th,.data-table td{padding:10px 12px;font-size:.8rem}
      .btn{min-height:42px}
      input,select,textarea{font-size:16px!important;min-height:44px}
      .modal-overlay{padding:0;align-items:flex-end}
      .modal{border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto}
      .toast-container{left:12px;right:12px;bottom:16px;max-width:100%}
    }
    /* Classroom */
    .classroom-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:var(--transition)}
    .classroom-card-type{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px}
    .classroom-card-title{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:6px}
    .classroom-card-meta{font-size:.8rem;color:var(--text-muted);line-height:1.7}
    @media print{.sidebar,.topbar,.wa-bulk-bar,.btn,.modal-overlay,.toast-container{display:none!important}.main-content{margin-left:0!important}.page-content{padding:0!important}}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="layoutSidebar"></div>
  <div class="main-content">
    <div id="layoutTopbar"></div>
    <div class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <h2>📋 Attendance</h2>
          <p>Mark and track student attendance</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <input type="date" id="attDate" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.9rem">
          <select id="attClass" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.9rem;background:#fff">
            <option value="">All Classes</option>
            <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
          </select>
          <button class="btn btn-primary" onclick="saveAttendance()">💾 Save</button>
          <button class="wa-send-btn" onclick="sendAllAbsentAlerts()" title="Send WhatsApp alerts to all absent students' parents">
            😔 Alert All Absent
          </button>
          <button class="wa-send-btn" style="background:#8e44ad" onclick="WA.showBulkModal(document.getElementById('attClass').value)" title="Bulk message to class parents">
            📢 Bulk Message
          </button>
        </div>
      </div>

      <!-- Overview cards -->
      <div class="stats-grid" id="attStats" style="margin-bottom:20px"></div>

      <!-- Charts + Mark grid -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px" id="attGrid">
        <div class="table-card">
          <div class="table-card-header">
            <div class="table-card-title">Mark Attendance</div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-success btn-sm" onclick="markAll('present')">✅ All Present</button>
              <button class="btn btn-danger btn-sm" onclick="markAll('absent')">❌ All Absent</button>
            </div>
          </div>
          <div class="table-overflow">
            <table class="data-table" id="attTable">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Class</th>
                  <th>Attendance %</th>
                  <th>Today</th>
                  <th>Alert Parent</th>
                </tr>
              </thead>
              <tbody id="attTbody"></tbody>
            </table>
          </div>
        </div>

        <div>
          <div class="chart-card" style="margin-bottom:16px">
            <div class="chart-card-header">
              <div class="chart-card-title">📊 Summary</div>
            </div>
            <div class="chart-container" style="height:180px"><canvas id="attSummaryChart"></canvas></div>
          </div>

          <div class="table-card">
            <div class="table-card-header"><div class="table-card-title">⚠️ Low Attendance</div></div>
            <div id="lowAttList" style="padding:10px"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="logo_data.js"></script>
<script src="core.js"></script>
<script src="whatsapp.js"></script>
<script>
let attData = {};
let currentStudents = [];
let todayMarked = {};
let summaryChart = null;

function pageInit() {
  const user = Auth.require();
  if (!user) return;
  buildLayout(user.role, 'Attendance');

  // Set today's date
  document.getElementById('attDate').value = today();

  attData = DB.attendance();
  loadStudents();
  renderStats();
  renderSummaryChart();
  renderLowAttendance();

  document.getElementById('attClass').addEventListener('change', loadStudents);

  // Handle responsive grid
  const grid = document.getElementById('attGrid');
  function resize() { grid.style.gridTemplateColumns = window.innerWidth < 860 ? '1fr' : '2fr 1fr'; }
  window.addEventListener('resize', resize);
  resize();
}

function loadStudents() {
  const cls = document.getElementById('attClass').value;
  const all = DB.students().filter(s => s.status === 'active');
  currentStudents = cls ? all.filter(s => s.class === cls) : all;
  renderAttTable();
}

function renderAttTable() {
  const tbody = document.getElementById('attTbody');
  if (!currentStudents.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No students for selected class</div></td></tr>`;
    return;
  }
  tbody.innerHTML = currentStudents.map(s => {
    const att    = attData[s.id] || { percentage: 0 };
    const marked = todayMarked[s.id];
    const isAbsent = marked === 'absent';
    return `
      <tr id="row-${s.id}">
        <td>
          <div class="avatar-cell">
            <div class="avatar-sm" style="background:${acolor(s.name)}">${initials(s.name)}</div>
            <div><div class="avatar-name">${s.name}</div><div class="avatar-sub">${s.id}</div></div>
          </div>
        </td>
        <td>Class ${s.class}-${s.section}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="progress-bar" style="width:70px">
              <div class="progress-fill" style="width:${att.percentage}%;background:${att.percentage >= 75 ? 'var(--accent-2)' : 'var(--accent-3)'}"></div>
            </div>
            <span style="font-weight:700;font-size:0.85rem;color:${att.percentage >= 75 ? 'var(--accent-2)' : 'var(--accent-3)'}">${att.percentage}%</span>
          </div>
        </td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm att-btn-present ${marked === 'present' ? 'btn-success' : 'btn-ghost'}" 
              onclick="markOne('${s.id}','present')" style="min-width:80px">
              ✅ Present
            </button>
            <button class="btn btn-sm att-btn-absent ${marked === 'absent' ? 'btn-danger' : 'btn-ghost'}"
              onclick="markOne('${s.id}','absent')">
              ❌
            </button>
          </div>
        </td>
        <td>
          <div id="waAlertCell-${s.id}">
            ${isAbsent
              ? `<button class="wa-send-btn" style="font-size:0.78rem;padding:6px 11px;background:#e74c3c"
                  onclick="waSendAbsent('${s.id}')">😔 Send Absent Alert</button>`
              : `<button class="wa-fee-btn" onclick="waOpenPicker('${s.id}')" title="Message parent">💬 Message</button>`
            }
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

function markOne(studentId, status) {
  todayMarked[studentId] = status;
  const row  = document.getElementById('row-' + studentId);
  if (!row) return;
  const pBtn = row.querySelector('.att-btn-present');
  const aBtn = row.querySelector('.att-btn-absent');
  if (status === 'present') {
    pBtn.className = 'btn btn-sm att-btn-present btn-success';
    aBtn.className = 'btn btn-sm att-btn-absent btn-ghost';
  } else {
    pBtn.className = 'btn btn-sm att-btn-present btn-ghost';
    aBtn.className = 'btn btn-sm att-btn-absent btn-danger';
  }
  // Dynamically show/hide the absent alert button in the WA column
  const waCell = document.getElementById('waAlertCell-' + studentId);
  if (waCell) {
    if (status === 'absent') {
      waCell.innerHTML = `<button class="wa-send-btn" style="font-size:0.78rem;padding:6px 11px;background:#e74c3c;animation:toastIn 0.2s ease both"
        onclick="waSendAbsent('${studentId}')">😔 Send Absent Alert</button>`;
    } else {
      waCell.innerHTML = `<button class="wa-fee-btn" onclick="waOpenPicker('${studentId}')">💬 Message</button>`;
    }
  }
}

function markAll(status) {
  currentStudents.forEach(s => markOne(s.id, status));
}

function saveAttendance() {
  const attDb = DB.attendance();
  let changed = 0;
  currentStudents.forEach(s => {
    if (todayMarked[s.id]) {
      const current = attDb[s.id] || { percentage: 0, present: 0, absent: 0 };
      if (todayMarked[s.id] === 'present') {
        current.present = (current.present || 20) + 1;
      } else {
        current.absent = (current.absent || 5) + 1;
      }
      const total = current.present + current.absent;
      current.percentage = Math.round((current.present / total) * 100);
      attDb[s.id] = current;
      changed++;
    }
  });
  if (!changed) { toast('No attendance marked yet', 'warning'); return; }
  DB.saveAttendance(attDb);
  attData = attDb;
  todayMarked = {};
  renderAttTable();
  renderStats();
  renderSummaryChart();
  renderLowAttendance();
  toast(`Attendance saved for ${changed} students!`, 'success');
}

function renderStats() {
  const vals = Object.values(attData);
  const avg = vals.length ? Math.round(vals.reduce((a, b) => a + b.percentage, 0) / vals.length) : 0;
  const total = DB.students().filter(s => s.status === 'active').length;
  const low = vals.filter(a => a.percentage < 75).length;
  const today75 = vals.filter(a => a.percentage >= 75).length;

  document.getElementById('attStats').innerHTML = `
    <div class="stat-card" style="--card-accent:#1a2744;--card-accent-bg:rgba(26,39,68,0.09)">
      <div class="stat-icon">📊</div>
      <div class="stat-content"><div class="stat-value">${avg}%</div><div class="stat-label">Avg Attendance</div></div>
    </div>
    <div class="stat-card" style="--card-accent:#27ae60;--card-accent-bg:rgba(39,174,96,0.09)">
      <div class="stat-icon">✅</div>
      <div class="stat-content"><div class="stat-value">${today75}</div><div class="stat-label">Above 75%</div></div>
    </div>
    <div class="stat-card" style="--card-accent:#e74c3c;--card-accent-bg:rgba(231,76,60,0.09)">
      <div class="stat-icon">⚠️</div>
      <div class="stat-content"><div class="stat-value">${low}</div><div class="stat-label">Below 75%</div></div>
    </div>
    <div class="stat-card" style="--card-accent:#f5a623;--card-accent-bg:rgba(245,166,35,0.09)">
      <div class="stat-icon">👥</div>
      <div class="stat-content"><div class="stat-value">${total}</div><div class="stat-label">Total Students</div></div>
    </div>
  `;
}

function renderSummaryChart() {
  const vals = Object.values(attData);
  const above90 = vals.filter(a => a.percentage >= 90).length;
  const btw75_90 = vals.filter(a => a.percentage >= 75 && a.percentage < 90).length;
  const below75 = vals.filter(a => a.percentage < 75).length;

  const ctx = document.getElementById('attSummaryChart').getContext('2d');
  if (summaryChart) summaryChart.destroy();
  summaryChart = donutChart(ctx,
    ['Above 90%', '75–90%', 'Below 75%'],
    [above90, btw75_90, below75],
    ['#27ae60', '#f5a623', '#e74c3c']
  );
}

function renderLowAttendance() {
  const students = DB.students();
  const low = students.filter(s => {
    const att = attData[s.id];
    return att && att.percentage < 75;
  }).sort((a, b) => (attData[a.id]?.percentage || 0) - (attData[b.id]?.percentage || 0));

  const container = document.getElementById('lowAttList');
  if (!low.length) {
    container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:0.85rem">🎉 All students above 75%</div>';
    return;
  }
  container.innerHTML = low.map(s => {
    const att = attData[s.id];
    return `
      <div style="padding:10px 12px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
          <div class="avatar-sm" style="background:${acolor(s.name)};width:32px;height:32px;font-size:0.8rem">${initials(s.name)}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:0.85rem">${s.name}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">Class ${s.class} · ${s.parent_phone}</div>
          </div>
          <span style="font-weight:800;color:var(--accent-3);font-size:0.88rem">${att.percentage}%</span>
        </div>
        <button class="wa-send-btn" style="font-size:0.75rem;padding:5px 10px;background:#8e44ad;width:100%"
          onclick="waSendLowAttAlert('${s.id}','${att.percentage}')">
          ⚠️ Send Low Attendance Alert
        </button>
      </div>
    `;
  }).join('');
}

// Send absent alert to ALL students marked absent today
function sendAllAbsentAlerts() {
  const absentIds = Object.entries(todayMarked)
    .filter(([, v]) => v === 'absent')
    .map(([id]) => id);

  if (!absentIds.length) {
    toast('No students marked absent yet today', 'warning');
    return;
  }

  const students = DB.students().filter(s => absentIds.includes(s.id) && s.parent_phone);
  confirm2(`Send absent alerts to parents of ${students.length} students via WhatsApp?`, () => {
    const school = DB.college()?.name || 'M.A. SR. SEC. SCHOOL';
    let i = 0;
    function next() {
      if (i >= students.length) {
        toast(`✅ Absent alerts sent to ${students.length} parents`, 'success');
        return;
      }
      const s = students[i++];
      const msg   = WA.absent(s.name, school);
      const phone = WA._cleanPhone(s.parent_phone);
      if (phone) window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
      setTimeout(next, 1300);
    }
    next();
  });
}

// Low attendance alert for specific student
function waSendLowAttAlert(studentId, percentage) {
  const student = DB.students().find(s => s.id === studentId);
  if (!student) return;
  const school = DB.college()?.name || 'M.A. SR. SEC. SCHOOL';
  const msg  = WA.lowAtt(student.name, percentage, school);
  const ok   = WA.open(student.parent_phone, msg);
  if (ok) toast(`Low attendance alert sent for ${student.name}`, 'success');
}
</script>

(function() {

    var l = document.getElementById('page-loader');
    if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 300); }
  }
  window.addEventListener('load', removeLoader);
  setTimeout(removeLoader, 2000); // fallback
})();
</script>
