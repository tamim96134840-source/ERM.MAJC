<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uniform Store – School ERP</title>
  <link rel="stylesheet" href="style.css">
  <style id="page-loader-style">
    #page-loader {
      position: fixed; inset: 0; background: #1a2744;
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; flex-direction: column; gap: 16px;
      transition: opacity 0.3s ease;
    }
    #page-loader .pl-spin {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #f5a623;
      border-radius: 50%;
      animation: pl-spin 0.7s linear infinite;
    }
    #page-loader .pl-text {
      color: rgba(255,255,255,0.6);
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 0.85rem; font-weight: 600;
    }
    @keyframes pl-spin { to { transform: rotate(360deg); } }
  </style>

  <style id="fallback-css">
    /* Emergency fallback — ensures pages render if style.css path fails */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#1a2744;--accent:#f5a623;--accent-2:#27ae60;--accent-3:#e74c3c;--surface:#f0f4ff;--surface-2:#e8edf8;--bg:#f5f7ff;--border:#dde3f0;--border-2:#c8d0e8;--text:#1a2744;--text-muted:#6b7a99;--card:#fff;--sidebar-w:260px;--topbar-h:64px;--shadow:0 2px 12px rgba(26,39,68,.08);--shadow-md:0 4px 20px rgba(26,39,68,.11);--shadow-lg:0 8px 32px rgba(26,39,68,.15);--radius:14px;--radius-sm:9px;--transition:all .18s ease}
    html{-webkit-text-size-adjust:100%}
    body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
    img{max-width:100%;display:block}
    a{color:var(--primary);text-decoration:none}
    button{font-family:inherit}
    input,select,textarea{font-family:inherit;outline:none}
    /* Layout */
    .app-layout{display:flex;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#1a2744,#0f1829);color:#fff;display:flex;flex-direction:column;z-index:1000;overflow-y:auto;transition:transform .28s ease;box-shadow:4px 0 24px rgba(0,0,0,.18)}
    .main-content{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;transition:margin-left .28s ease}
    .topbar{position:sticky;top:0;height:var(--topbar-h);background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;z-index:900;box-shadow:0 2px 10px rgba(26,39,68,.06)}
    .page-content{flex:1;padding:24px;max-width:1400px;width:100%}
    .sidebar-header{display:flex;align-items:center;gap:12px;padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
    .sidebar-logo{width:48px;height:48px;object-fit:contain;border-radius:12px;background:rgba(255,255,255,.1);padding:4px;flex-shrink:0}
    .sidebar-school-name{font-size:.82rem;font-weight:800;line-height:1.3;color:#fff}
    .sidebar-school-tagline{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:2px;font-style:italic}
    .sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
    .nav-section-label{font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:14px 8px 6px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:rgba(255,255,255,.72);font-size:.88rem;font-weight:500;cursor:pointer;transition:var(--transition);text-decoration:none;white-space:nowrap}
    .nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
    .nav-item.active{background:rgba(245,166,35,.18);color:var(--accent);font-weight:700}
    .nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
    .sidebar-footer{padding:14px 14px 18px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
    .sidebar-user{display:flex;align-items:center;gap:10px}
    .sidebar-user-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;flex-shrink:0;overflow:hidden}
    .sidebar-user-name{font-size:.82rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sidebar-user-role{font-size:.7rem;color:rgba(255,255,255,.45)}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
    /* Topbar */
    .menu-toggle{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--primary);padding:6px;border-radius:8px}
    .topbar-title{flex:1;font-size:1rem;font-weight:700;color:var(--primary)}
    .topbar-btn{width:38px;height:38px;border:none;background:var(--surface);border-radius:10px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
    /* Page header */
    .page-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .page-header-left h2{font-size:1.4rem;font-weight:800;color:var(--primary)}
    .page-header-left p{font-size:.85rem;color:var(--text-muted);margin-top:3px}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:var(--transition);position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--card-accent,var(--primary));border-radius:4px 0 0 4px}
    .stat-icon{width:48px;height:48px;border-radius:12px;background:var(--card-accent-bg,rgba(26,39,68,.08));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
    .stat-value{font-size:1.6rem;font-weight:800;color:var(--primary);line-height:1.1}
    .stat-label{font-size:.78rem;color:var(--text-muted);font-weight:500;margin-top:2px}
    .stat-change{font-size:.72rem;font-weight:600;margin-top:4px}
    .stat-change.up{color:var(--accent-2)}.stat-change.down{color:var(--accent-3)}
    /* Charts */
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:24px}
    .chart-card,.table-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
    .chart-card{padding:20px}
    .chart-card-title{font-size:.95rem;font-weight:700;color:var(--primary)}
    .chart-card-sub{font-size:.75rem;color:var(--text-muted);margin-top:2px}
    .chart-container{position:relative;height:220px}
    .table-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
    .table-card-title{font-size:.95rem;font-weight:700;color:var(--primary)}
    /* Table */
    .table-overflow{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .data-table{width:100%;border-collapse:collapse;min-width:500px}
    .data-table th{background:var(--surface);font-size:.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    .data-table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:middle}
    .data-table tr:last-child td{border-bottom:none}
    .data-table tbody tr:hover{background:var(--surface)}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border:1.5px solid transparent;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;text-decoration:none;line-height:1.3}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn-primary:hover{background:#243558}
    .btn-accent{background:var(--accent);color:var(--primary);border-color:var(--accent)}
    .btn-ghost{background:transparent;color:var(--primary);border-color:var(--border)}
    .btn-ghost:hover{background:var(--surface)}
    .btn-success{background:var(--accent-2);color:#fff}
    .btn-danger{background:var(--accent-3);color:#fff}
    .btn-sm{padding:6px 12px;font-size:.8rem;border-radius:7px}
    .btn-full{width:100%}
    .btn-icon{width:34px;height:34px;padding:0;border-radius:8px}
    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:700;white-space:nowrap}
    .badge-success{background:rgba(39,174,96,.12);color:#1a8a48}
    .badge-danger{background:rgba(231,76,60,.12);color:#b52d20}
    .badge-warning{background:rgba(245,166,35,.12);color:#b57a00}
    .badge-info{background:rgba(41,128,185,.12);color:#1a6090}
    .badge-neutral{background:var(--surface-2);color:var(--text-muted)}
    /* Forms */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .form-group label{font-size:.82rem;font-weight:700;color:var(--text-muted);letter-spacing:.02em}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    input[type=text],input[type=email],input[type=tel],input[type=number],input[type=password],input[type=date],input[type=time],select,textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--text);background:#fff;transition:var(--transition);width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,39,68,.1)}
    textarea{resize:vertical;min-height:90px}
    /* Modals */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
    .modal-title{font-size:1rem;font-weight:800;color:var(--primary)}
    .modal-close{width:32px;height:32px;background:var(--surface);border:none;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
    .modal-body{padding:20px 22px}
    .modal-footer{padding:14px 22px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
    /* Avatars */
    .avatar-cell{display:flex;align-items:center;gap:10px;min-width:0}
    .avatar-sm{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;flex-shrink:0}
    .avatar-name{font-weight:600;font-size:.88rem}
    .avatar-sub{font-size:.75rem;color:var(--text-muted)}
    /* Progress */
    .progress-bar{height:7px;background:var(--surface-2);border-radius:99px;overflow:hidden;flex:1}
    .progress-fill{height:100%;border-radius:99px;transition:width .6s ease}
    /* Toast */
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column-reverse;gap:10px;pointer-events:none;max-width:360px}
    .toast{display:flex;align-items:center;gap:12px;padding:13px 18px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.12);animation:toastIn .3s ease;pointer-events:all;min-width:240px}
    @keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
    .toast-icon{font-size:1.1rem;flex-shrink:0}.toast-msg{font-size:.85rem;font-weight:600;flex:1}
    .toast-success{border-left:4px solid var(--accent-2)}.toast-error{border-left:4px solid var(--accent-3)}.toast-warning{border-left:4px solid var(--accent)}
    /* Empty state */
    .empty-state{text-align:center;padding:48px 24px}
    .empty-state-icon{font-size:3rem;margin-bottom:14px;opacity:.6}
    .empty-state-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px}
    /* WA */
    .wa-bulk-bar{background:linear-gradient(135deg,#075E54,#128C7E);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;color:#fff;flex-wrap:wrap}
    .wa-send-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:#25D366;color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:var(--transition);white-space:nowrap}
    .wa-fee-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(39,174,96,.12);color:#1a8a48;border:1.5px solid rgba(39,174,96,.25);border-radius:8px;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:var(--transition)}
    /* Info card */
    .info-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:var(--transition)}
    .info-card-icon{font-size:2rem;margin-bottom:10px}
    .info-card-title{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:4px}
    .info-card-sub{font-size:.78rem;color:var(--text-muted);margin-top:3px}
    /* Tabs */
    .tab-bar{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:12px;margin-bottom:20px;flex-wrap:wrap}
    .tab-item{padding:8px 18px;border:none;border-radius:9px;background:transparent;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--text-muted);transition:var(--transition)}
    .tab-item.active{background:var(--primary);color:#fff}
    /* Announcement */
    .announcement-item{padding:14px 0;border-bottom:1px solid var(--border)}
    .announcement-item:last-child{border-bottom:none}
    .announcement-title{font-weight:700;font-size:.92rem;color:var(--primary);margin-bottom:5px}
    .announcement-body{font-size:.85rem;color:var(--text-muted);line-height:1.6;margin-bottom:8px}
    .announcement-meta{display:flex;gap:16px;font-size:.75rem;color:var(--text-light,#9aa5c0)}
    /* Fee row */
    .fee-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
    .fee-row-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .fee-row-name{font-size:.88rem;font-weight:600}.fee-row-date{font-size:.75rem;color:var(--text-muted)}.fee-row-amount{font-size:.95rem;font-weight:800}
    /* Search */
    .search-input-wrap{position:relative}.search-input-wrap input{padding-left:38px;width:220px}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--text-muted);pointer-events:none}
    /* Upload */
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:var(--transition);color:var(--text-muted);font-size:.85rem}
    .upload-area:hover{border-color:var(--primary);background:var(--surface)}
    .upload-icon{font-size:2rem;margin-bottom:8px}
    /* Responsive */
    @media(max-width:900px){
      .main-content{margin-left:0!important}
      .menu-toggle{display:flex!important}
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.25)}
      .sidebar-overlay.show{display:block}
      .page-content{padding:16px}
    }
    @media(max-width:600px){
      .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
      .stat-value{font-size:1.3rem}
      .stat-card{padding:14px 12px}
      .charts-grid{grid-template-columns:1fr}
      .form-row{grid-template-columns:1fr}
      .page-header{flex-direction:column;align-items:flex-start}
      .data-table th,.data-table td{padding:10px 12px;font-size:.8rem}
      .btn{min-height:42px}
      input,select,textarea{font-size:16px!important;min-height:44px}
      .modal-overlay{padding:0;align-items:flex-end}
      .modal{border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto}
      .toast-container{left:12px;right:12px;bottom:16px;max-width:100%}
    }
    /* Classroom */
    .classroom-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);transition:var(--transition)}
    .classroom-card-type{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px}
    .classroom-card-title{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:6px}
    .classroom-card-meta{font-size:.8rem;color:var(--text-muted);line-height:1.7}
    @media print{.sidebar,.topbar,.wa-bulk-bar,.btn,.modal-overlay,.toast-container{display:none!important}.main-content{margin-left:0!important}.page-content{padding:0!important}}
  </style>

  <style>
    /* ---- Uniform-specific styles ---- */
    .store-hero {
      background: linear-gradient(135deg, #1a2744 0%, #243560 55%, #1a4a2e 100%);
      border-radius: 18px;
      padding: 26px 28px;
      color: #fff;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .store-hero::after {
      content: '👔';
      position: absolute;
      right: 24px; top: 50%;
      transform: translateY(-50%);
      font-size: 5rem;
      opacity: 0.12;
      pointer-events: none;
    }
    .store-hero h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .store-hero p  { opacity: 0.75; font-size: 0.9rem; }

    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }
    .filter-bar .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .filter-bar input[type="text"] {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.18s;
    }
    .filter-bar input[type="text"]:focus { border-color: var(--primary); }
    .filter-bar .search-icon-abs {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem; color: var(--text-muted); pointer-events: none;
    }
    .filter-chip-row {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .filter-chip {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: var(--text-muted);
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .filter-chip.active, .filter-chip:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Uniform Cards */
    .uniform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 18px;
    }
    .uniform-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    .uniform-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

    .uniform-card-header {
      padding: 22px 20px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .uniform-emoji-icon {
      width: 52px; height: 52px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem;
      flex-shrink: 0;
    }
    .uniform-card-info { flex: 1; min-width: 0; }
    .uniform-card-name {
      font-weight: 800;
      font-size: 0.97rem;
      color: var(--primary);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .uniform-card-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .uniform-price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .uniform-card-body { padding: 14px 18px; flex: 1; }

    .size-chips {
      display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .size-chip {
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 0.76rem;
      font-weight: 700;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      cursor: default;
      transition: all 0.12s ease;
    }
    .size-chip.available    { border-color: #27ae60; color: #27ae60; background: #f0fdf4; }
    .size-chip.low          { border-color: #f5a623; color: #c07800; background: #fffbeb; }
    .size-chip.out          { border-color: var(--border); color: var(--border); background: var(--surface); text-decoration: line-through; }
    .size-chip.selected     { background: var(--primary); color: #fff; border-color: var(--primary); }

    .stock-bar-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .stock-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; }
    .stock-count { font-weight: 800; font-size: 0.88rem; }

    .uniform-card-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Table view */
    .view-toggle {
      display: flex;
      background: var(--surface);
      border-radius: 9px;
      padding: 4px;
      gap: 2px;
    }
    .view-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 7px;
      background: transparent;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s ease;
      color: var(--text-muted);
    }
    .view-btn.active { background: #fff; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    /* Stock indicator dot */
    .stock-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    /* Admin-only edit bar on card */
    .admin-actions {
      display: none;
    }
    body.role-admin .admin-actions { display: flex; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="layoutSidebar"></div>
  <div class="main-content">
    <div id="layoutTopbar"></div>
    <div class="page-content">

      <!-- Hero -->
      <div class="store-hero">
        <div>
          <h2>👔 Uniform Store</h2>
          <p>Check availability, sizes and prices for all school uniforms</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-accent" id="adminAddUniformBtn" style="display:none" onclick="openModal('addUniformModal')">+ Add Uniform</button>

      <!-- Stats row -->
      <div class="stats-grid" id="uniformStats" style="margin-bottom:20px;grid-template-columns:repeat(4,1fr)"></div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="search-wrap" id="uniformSearchWrap">
          <span class="search-icon-abs">🔍</span>
          <input type="text" id="uniformSearch" placeholder="Search uniforms...">
        </div>

        <div class="filter-chip-row" id="categoryChips">
          <button class="filter-chip active" data-cat="" onclick="filterChip(this,'')">All</button>
          <button class="filter-chip" data-cat="shirt"     onclick="filterChip(this,'shirt')">👕 Shirts</button>
          <button class="filter-chip" data-cat="trouser"   onclick="filterChip(this,'trouser')">👖 Trousers</button>
          <button class="filter-chip" data-cat="dress"     onclick="filterChip(this,'dress')">👗 Dress</button>
          <button class="filter-chip" data-cat="blazer"    onclick="filterChip(this,'blazer')">🧥 Blazer</button>
          <button class="filter-chip" data-cat="shoes"     onclick="filterChip(this,'shoes')">👟 Shoes</button>
          <button class="filter-chip" data-cat="sports"    onclick="filterChip(this,'sports')">🏃 Sports</button>
          <button class="filter-chip" data-cat="accessory" onclick="filterChip(this,'accessory')">🎽 Accessories</button>
          <button class="filter-chip" data-cat="bag"       onclick="filterChip(this,'bag')">🎒 Bags</button>
        </div>

        <div class="filter-chip-row">
          <select id="stockFilter" onchange="applyFilters()"
            style="padding:7px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.85rem;background:#fff">
            <option value="">All Stock</option>
            <option value="in">In Stock</option>
            <option value="low">Low Stock</option>
            <option value="out">Out of Stock</option>
          </select>
          <div class="view-toggle">
            <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')">⊞ Grid</button>
            <button class="view-btn"        id="listViewBtn" onclick="setView('list')">☰ List</button>
          </div>
        </div>
      </div>

      <!-- Results count -->
      <div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:0.85rem;color:var(--text-muted)" id="resultsCount"></div>
      </div>

      <!-- Uniform Grid -->
      <div class="uniform-grid" id="uniformGrid"></div>

      <!-- List view table (hidden by default) -->
      <div class="table-card" id="uniformTableView" style="display:none">
        <div class="table-card-header">
          <div class="table-card-title">All Uniform Items</div>
        </div>
        <div class="table-overflow">
          <table class="data-table" id="uniformListTable">
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Classes</th>
                <th>Sizes Available</th>
                <th>Total Stock</th>
                <th>Price</th>
                <th>Status</th>
                <th class="admin-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="uniformListTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Size availability checker -->
      <div class="table-card" style="margin-top:24px" id="sizeCheckerCard">
        <div class="table-card-header">
          <div class="table-card-title">🔎 Size Availability Checker</div>
        </div>
        <div style="padding:20px">
          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px">
            <div style="flex:1;min-width:180px">
              <label style="font-size:0.82rem;font-weight:700;display:block;margin-bottom:6px">Select Item</label>
              <select id="checkerItem" onchange="runSizeCheck()"
                style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.9rem;background:#fff">
                <option value="">-- Select Uniform --</option>
              </select>
            </div>
            <div style="flex:0 0 160px">
              <label style="font-size:0.82rem;font-weight:700;display:block;margin-bottom:6px">Select Size</label>
              <select id="checkerSize" onchange="runSizeCheck()"
                style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.9rem;background:#fff">
                <option value="">-- All Sizes --</option>
              </select>
            </div>

          <div id="sizeCheckerResult"></div>

</div>

      <button class="modal-close" onclick="closeModal('stockUpdateModal')">✕</button>
    </div>
    <div class="modal-body" id="stockUpdateBody"></div>

      <button class="btn btn-ghost" onclick="closeModal('stockUpdateModal')">Cancel</button>

<script src="logo_data.js"></script>
<script src="core.js"></script>
<script src="search.js"></script>
<script>
let allUniforms = [];
let currentCategoryFilter = '';
let currentView = 'grid';
let stockUpdateTarget = null;

function pageInit() {
  const user = Auth.require();
  if (!user) return;
  buildLayout(user.role, 'Uniform Store');

  // Show admin controls
  if (user.role === 'admin') {
    document.getElementById('adminAddUniformBtn').style.display = 'inline-flex';
    document.body.classList.add('role-admin');
    document.querySelectorAll('.admin-actions').forEach(el => el.style.display = 'flex');
  }

  allUniforms = DB.uniforms();
  renderStats();
  renderUniforms(allUniforms);
  populateCheckerDropdown();

  // Smart search
  SmartSearch.attach('uniformSearch', {
    types: ['uniforms'],
    placeholder: '🔍 Search by name, category...',
    onSelect: (item) => {
      currentCategoryFilter = '';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('.filter-chip[data-cat=""]').classList.add('active');
      renderUniforms(allUniforms.filter(u =>
        u.name.toLowerCase().includes(item.label.toLowerCase())
      ));
    },
  });

  // Live text filter
  document.getElementById('uniformSearch').addEventListener('input', applyFilters);
}

function renderStats() {
  const u = allUniforms;
  const inStock  = u.filter(x => DB.getTotalUniformStock(x) > 5).length;
  const lowStock = u.filter(x => { const t = DB.getTotalUniformStock(x); return t > 0 && t <= 5; }).length;
  const outStock = u.filter(x => DB.getTotalUniformStock(x) === 0).length;
  const totalVal = u.reduce((s, x) => s + x.price * DB.getTotalUniformStock(x), 0);

  document.getElementById('uniformStats').innerHTML = `
    <div class="stat-card" style="--card-accent:#1a2744;--card-accent-bg:rgba(26,39,68,0.09)">
      <div class="stat-icon">👔</div>
      <div class="stat-content"><div class="stat-value">${u.length}</div><div class="stat-label">Total Items</div></div>
    </div>
    <div class="stat-card" style="--card-accent:#27ae60;--card-accent-bg:rgba(39,174,96,0.09)">
      <div class="stat-icon">✅</div>
      <div class="stat-content"><div class="stat-value">${inStock}</div><div class="stat-label">In Stock</div></div>
    </div>
    <div class="stat-card" style="--card-accent:#f5a623;--card-accent-bg:rgba(245,166,35,0.09)">
      <div class="stat-icon">⚠️</div>
      <div class="stat-content"><div class="stat-value">${lowStock}</div><div class="stat-label">Low Stock</div></div>
    </div>
    <div class="stat-card" style="--card-accent:#e74c3c;--card-accent-bg:rgba(231,76,60,0.09)">
      <div class="stat-icon">📦</div>
      <div class="stat-content"><div class="stat-value">${money(totalVal)}</div><div class="stat-label">Stock Value</div></div>
    </div>
  `;
}

function filterChip(btn, cat) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentCategoryFilter = cat;
  applyFilters();
}

function applyFilters() {
  const q          = (document.getElementById('uniformSearch').value || '').toLowerCase();
  const stockF     = document.getElementById('stockFilter').value;
  let filtered     = allUniforms;

  if (currentCategoryFilter) filtered = filtered.filter(u => u.category === currentCategoryFilter);
  if (q) filtered = filtered.filter(u => u.name.toLowerCase().includes(q) || u.category.includes(q));
  if (stockF) {
    filtered = filtered.filter(u => {
      const t = DB.getTotalUniformStock(u);
      if (stockF === 'in')  return t > 5;
      if (stockF === 'low') return t > 0 && t <= 5;
      if (stockF === 'out') return t === 0;
      return true;
    });
  }

  renderUniforms(filtered);
  if (currentView === 'list') renderListView(filtered);
}

function renderUniforms(items) {
  document.getElementById('resultsCount').textContent =
    `Showing ${items.length} of ${allUniforms.length} items`;

  const grid = document.getElementById('uniformGrid');
  const user = Auth.getUser();
  const isAdmin = user?.role === 'admin';

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">👔</div>
      <div class="empty-state-title">No uniforms found</div>
      <p>Try a different search or category</p>
    </div>`;
    return;
  }

  grid.innerHTML = items.map(u => {
    const totalStock = DB.getTotalUniformStock(u);
    const status     = DB.getUniformStockStatus(u);
    const bgColor    = u.color || '#1a2744';
    const lightBg    = bgColor + '22';

    const sizesHTML = u.sizes.map(sz => {
      const qty = u.stock?.[sz] || 0;
      const cls = qty === 0 ? 'out' : qty <= 3 ? 'low' : 'available';
      return `<span class="size-chip ${cls}" title="${qty} in stock">${sz}</span>`;
    }).join('');

    return `
      <div class="uniform-card">
        <div class="uniform-card-header">
          <div class="uniform-emoji-icon" style="background:${lightBg}">
            ${u.image_emoji || '👔'}
          </div>
          <div class="uniform-card-info">
            <div class="uniform-card-name">${u.name}</div>
            <div class="uniform-card-meta">Class: ${u.classes} &nbsp;·&nbsp; ${u.category}</div>
          </div>
          <div class="uniform-price">${money(u.price)}</div>
        </div>

        <div class="uniform-card-body">
          <div class="stock-bar-row">
            <div class="stock-dot" style="background:${status.color}"></div>
            <div class="stock-label">${status.label}</div>
            <div class="stock-count" style="color:${status.color};margin-left:auto">${totalStock} pcs</div>
          </div>

          <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:7px">Available Sizes</div>
          <div class="size-chips">${sizesHTML}</div>

          <div style="margin-top:10px">
            <div class="progress-bar">
              <div class="progress-fill" style="width:${Math.min(100, (totalStock / 50) * 100)}%;background:${status.color}"></div>
            </div>
          </div>
        </div>

        <div class="uniform-card-footer">
          <button class="btn btn-primary btn-sm" onclick="showSizeDetail('${u.id}')">📏 Size Stock</button>
          ${isAdmin ? `
            <button class="btn btn-ghost btn-sm" onclick="openStockUpdate('${u.id}')">📦 Update</button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="editUniform('${u.id}')">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteUniform('${u.id}')">🗑️</button>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderListView(items) {
  const user    = Auth.getUser();
  const isAdmin = user?.role === 'admin';
  const tbody   = document.getElementById('uniformListTbody');
  tbody.innerHTML = items.map(u => {
    const total  = DB.getTotalUniformStock(u);
    const status = DB.getUniformStockStatus(u);
    const inStockSizes = u.sizes.filter(sz => (u.stock?.[sz] || 0) > 0).join(', ') || '—';
    return `
      <tr>
        <td>
          <div class="avatar-cell">
            <div style="font-size:1.4rem">${u.image_emoji || '👔'}</div>
            <div><div class="avatar-name">${u.name}</div><div class="avatar-sub">${u.id}</div></div>
          </div>
        </td>
        <td style="text-transform:capitalize">${u.category}</td>
        <td>${u.classes}</td>
        <td style="font-size:0.82rem">${inStockSizes}</td>
        <td><strong>${total}</strong> pcs</td>
        <td><strong>${money(u.price)}</strong></td>
        <td><span class="badge ${status.badge}">${status.label}</span></td>
        ${isAdmin ? `<td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="openStockUpdate('${u.id}')">📦</button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="editUniform('${u.id}')">✏️</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteUniform('${u.id}')">🗑️</button>
          </div>
        </td>` : '<td></td>'}
      </tr>
    `;
  }).join('');
}

function setView(v) {
  currentView = v;
  document.getElementById('gridViewBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', v === 'list');
  document.getElementById('uniformGrid').style.display       = v === 'grid' ? 'grid' : 'none';
  document.getElementById('uniformTableView').style.display  = v === 'list' ? 'block' : 'none';
  if (v === 'list') {
    const q      = (document.getElementById('uniformSearch').value || '').toLowerCase();
    const stockF = document.getElementById('stockFilter').value;
    let filtered = allUniforms;
    if (currentCategoryFilter) filtered = filtered.filter(u => u.category === currentCategoryFilter);
    if (q) filtered = filtered.filter(u => u.name.toLowerCase().includes(q));
    if (stockF) filtered = filtered.filter(u => {
      const t = DB.getTotalUniformStock(u);
      if (stockF === 'in')  return t > 5;
      if (stockF === 'low') return t > 0 && t <= 5;
      if (stockF === 'out') return t === 0;
      return true;
    });
    renderListView(filtered);
  }
}

// ---- Size Detail Modal ----
function showSizeDetail(id) {
  const u = allUniforms.find(x => x.id === id);
  if (!u) return;
  const rows = u.sizes.map(sz => {
    const qty    = u.stock?.[sz] || 0;
    const status = qty === 0 ? { label:'Out', color:'#e74c3c', pct:0 }
                 : qty <= 3  ? { label:'Low',  color:'#f5a623', pct:Math.min(100,(qty/20)*100) }
                 :              { label:'OK',   color:'#27ae60', pct:Math.min(100,(qty/20)*100) };
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:48px;font-weight:800;font-size:0.95rem;text-align:center;background:var(--surface);border-radius:8px;padding:6px">${sz}</div>
        <div style="flex:1">
          <div class="progress-bar"><div class="progress-fill" style="width:${status.pct}%;background:${status.color}"></div></div>
        </div>
        <div style="width:60px;text-align:right;font-weight:700;color:${status.color}">${qty} pcs</div>
        <span class="badge" style="background:${status.color}20;color:${status.color}">${status.label}</span>
      </div>
    `;
  }).join('');

  // Reuse view modal or create inline
  const bodyEl = document.getElementById('viewStudentBody') || (() => {
    let m = document.getElementById('sizeDetailInline');
    if (!m) {
      m = document.createElement('div');
      m.id = 'sizeDetailModal';
      m.className = 'modal-overlay';
      m.style.display = 'none';
      m.innerHTML = `<div class="modal" style="max-width:420px">
        <div class="modal-header">
          <div class="modal-title" id="sizeDetailTitle">Size Stock</div>
          <button class="modal-close" onclick="closeModal('sizeDetailModal')">✕</button>
        </div>
        <div class="modal-body" id="sizeDetailBody"></div>
      </div>`;
      document.body.appendChild(m);
      m.addEventListener('click', e => { if(e.target===m) closeModal('sizeDetailModal'); });
    }
    return null;
  })();

  let modal = document.getElementById('sizeDetailModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'sizeDetailModal';
    modal.className = 'modal-overlay';
    modal.style.display = 'none';
    modal.innerHTML = `<div class="modal" style="max-width:420px">
      <div class="modal-header">
        <div class="modal-title" id="sizeDetailTitle">Size Stock</div>
        <button class="modal-close" onclick="closeModal('sizeDetailModal')">✕</button>
      </div>
      <div class="modal-body" id="sizeDetailBody"></div>
    </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if(e.target===modal) closeModal('sizeDetailModal'); });
  }

  document.getElementById('sizeDetailTitle').textContent = `📏 ${u.name} — Size Availability`;
  document.getElementById('sizeDetailBody').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="background:var(--surface);border-radius:10px;padding:12px;flex:1;text-align:center">
        <div style="font-size:0.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase">Price</div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--primary);margin-top:4px">${money(u.price)}</div>
      </div>
      <div style="background:var(--surface);border-radius:10px;padding:12px;flex:1;text-align:center">
        <div style="font-size:0.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase">Total Stock</div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--primary);margin-top:4px">${DB.getTotalUniformStock(u)}</div>
      </div>
    </div>
    ${rows}
  `;
  openModal('sizeDetailModal');
}

// ---- Size Checker widget ----
function populateCheckerDropdown() {
  const sel = document.getElementById('checkerItem');
  allUniforms.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    // Populate sizes
    const sizesSel = document.getElementById('checkerSize');
    sizesSel.innerHTML = '<option value="">-- All Sizes --</option>';
    const u = allUniforms.find(x => x.id === sel.value);
    if (u) u.sizes.forEach(sz => {
      const opt = document.createElement('option');
      opt.value = sz; opt.textContent = sz;
      sizesSel.appendChild(opt);
    });
    runSizeCheck();
  });
}

function runSizeCheck() {
  const itemId  = document.getElementById('checkerItem').value;
  const sizeVal = document.getElementById('checkerSize').value;
  const result  = document.getElementById('sizeCheckerResult');

  if (!itemId) { result.innerHTML = '<p style="color:var(--text-muted);font-size:0.88rem">Select an item above to check availability.</p>'; return; }

  const u = allUniforms.find(x => x.id === itemId);
  if (!u) return;

  const sizesToShow = sizeVal ? [sizeVal] : u.sizes;
  const rows = sizesToShow.map(sz => {
    const qty    = u.stock?.[sz] || 0;
    const color  = qty === 0 ? '#e74c3c' : qty <= 3 ? '#f5a623' : '#27ae60';
    const label  = qty === 0 ? 'Out of Stock' : qty <= 3 ? 'Low Stock' : 'Available';
    return `
      <div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:14px">
        <div style="font-weight:800;font-size:1rem;width:60px;text-align:center;background:var(--surface);border-radius:8px;padding:8px">${sz}</div>
        <div style="flex:1">
          <div class="progress-bar" style="height:10px">
            <div class="progress-fill" style="width:${Math.min(100,(qty/20)*100)}%;background:${color};height:100%"></div>
          </div>
        </div>
        <div style="font-weight:700;color:${color};width:80px;text-align:right">${qty} pcs</div>
        <span class="badge" style="background:${color}20;color:${color};min-width:90px;text-align:center">${label}</span>
      </div>
    `;
  }).join('');

  result.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="font-size:2rem">${u.image_emoji || '👔'}</div>
      <div>
        <div style="font-weight:800;font-size:1rem">${u.name}</div>
        <div style="color:var(--text-muted);font-size:0.84rem">₹${u.price} · Class: ${u.classes}</div>
      </div>
    </div>
    <div style="background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden">
      ${rows}
    </div>
  `;
}

// ---- Admin CRUD ----
let sizeRowCount = 0;

function addSizeRow(sz = '', qty = '') {
  sizeRowCount++;
  const wrap = document.getElementById('sizeRows');
  const row  = document.createElement('div');
  row.id     = `sizeRow${sizeRowCount}`;
  row.style.cssText = 'display:flex;gap:8px;align-items:center';
  row.innerHTML = `
    <input type="text"   value="${sz}"  placeholder="Size (e.g. M or 30)" 
      style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.88rem" class="size-name-input">
    <input type="number" value="${qty}" placeholder="Qty" min="0"
      style="width:90px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Outfit,sans-serif;font-size:0.88rem" class="size-qty-input">
    <button type="button" class="btn btn-danger btn-sm btn-icon" onclick="this.parentElement.remove()">✕</button>
  `;
  wrap.appendChild(row);
}

function openAddUniform() {
  document.getElementById('uniformModalTitle').textContent = '➕ Add Uniform Item';
  document.getElementById('editUniformId').value = '';
  document.getElementById('uName').value = '';
  document.getElementById('uPrice').value = '';
  document.getElementById('uClasses').value = 'All';
  document.getElementById('uEmoji').value = '👔';
  document.getElementById('sizeRows').innerHTML = '';
  sizeRowCount = 0;
  addSizeRow('S', 10); addSizeRow('M', 15); addSizeRow('L', 12);
  openModal('addUniformModal');
}

function editUniform(id) {
  const u = allUniforms.find(x => x.id === id);
  if (!u) return;
  document.getElementById('uniformModalTitle').textContent = '✏️ Edit Uniform';
  document.getElementById('editUniformId').value = id;
  document.getElementById('uName').value = u.name;
  document.getElementById('uCategory').value = u.category;
  document.getElementById('uPrice').value = u.price;
  document.getElementById('uClasses').value = u.classes;
  document.getElementById('uEmoji').value = u.image_emoji || '👔';
  document.getElementById('sizeRows').innerHTML = '';
  sizeRowCount = 0;
  u.sizes.forEach(sz => addSizeRow(sz, u.stock?.[sz] || 0));
  openModal('addUniformModal');
}

function saveUniform() {
  const name     = document.getElementById('uName').value.trim();
  const category = document.getElementById('uCategory').value;
  const price    = parseFloat(document.getElementById('uPrice').value);
  const classes  = document.getElementById('uClasses').value.trim() || 'All';
  const emoji    = document.getElementById('uEmoji').value.trim() || '👔';
  const editId   = document.getElementById('editUniformId').value;

  if (!name || !price) { toast('Name and price are required', 'warning'); return; }

  // Collect sizes
  const sizeNameInputs = document.querySelectorAll('.size-name-input');
  const sizeQtyInputs  = document.querySelectorAll('.size-qty-input');
  const sizes = []; const stock = {};
  sizeNameInputs.forEach((inp, i) => {
    const sz = inp.value.trim();
    const qt = parseInt(sizeQtyInputs[i]?.value || 0) || 0;
    if (sz) { sizes.push(sz); stock[sz] = qt; }
  });
  if (!sizes.length) { toast('Add at least one size', 'warning'); return; }

  const uniforms = DB.uniforms();
  if (editId) {
    const idx = uniforms.findIndex(u => u.id === editId);
    if (idx >= 0) uniforms[idx] = { ...uniforms[idx], name, category, price, classes, sizes, stock, image_emoji: emoji };
    toast('Uniform updated!', 'success');
  } else {
    uniforms.push({ id: DB.newId('U'), name, category, price, classes, sizes, stock, image_emoji: emoji, color: '#1a2744' });
    toast('Uniform item added!', 'success');
  }
  DB.saveUniforms(uniforms);
  allUniforms = uniforms;
  renderStats();
  applyFilters();
  populateCheckerDropdown();
  closeModal('addUniformModal');
}

function deleteUniform(id) {
  confirm2('Delete this uniform item?', () => {
    const uniforms = DB.uniforms().filter(u => u.id !== id);
    DB.saveUniforms(uniforms);
    allUniforms = uniforms;
    renderStats();
    applyFilters();
    toast('Uniform deleted', 'error');
  });
}

function openStockUpdate(id) {
  const u = allUniforms.find(x => x.id === id);
  if (!u) return;
  stockUpdateTarget = id;
  const inputStyle = 'width:70px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:Outfit,sans-serif;text-align:center';
  document.getElementById('stockUpdateBody').innerHTML = `
    <p style="margin-bottom:14px;font-weight:600">${u.image_emoji} ${u.name}</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${u.sizes.map(sz => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border-radius:9px">
          <div style="font-weight:700;width:60px">${sz}</div>
          <div style="color:var(--text-muted);font-size:0.82rem">Current: ${u.stock?.[sz] || 0}</div>
          <input type="number" id="stockInput_${sz.replace(/\s/g,'_')}" value="${u.stock?.[sz] || 0}" min="0" style="${inputStyle}">
        </div>
      `).join('')}
    </div>
  `;
  openModal('stockUpdateModal');
}

function saveStockUpdate() {
  if (!stockUpdateTarget) return;
  const uniforms = DB.uniforms();
  const idx = uniforms.findIndex(u => u.id === stockUpdateTarget);
  if (idx < 0) return;
  const u = uniforms[idx];
  u.sizes.forEach(sz => {
    const inp = document.getElementById('stockInput_' + sz.replace(/\s/g,'_'));
    if (inp) u.stock[sz] = parseInt(inp.value) || 0;
  });
  DB.saveUniforms(uniforms);
  allUniforms = uniforms;
  applyFilters();
  renderStats();
  closeModal('stockUpdateModal');
  toast('Stock updated!', 'success');
  stockUpdateTarget = null;
}

// Responsive stats
function handleResize() {
  const statsGrid = document.getElementById('uniformStats');
  if (statsGrid) statsGrid.style.gridTemplateColumns = window.innerWidth < 600 ? '1fr 1fr' : 'repeat(4,1fr)';
}
window.addEventListener('resize', handleResize);
handleResize();
</script>
<script>
// Remove loader after page renders
(function() {
  function removeLoader() {
    var l = document.getElementById('page-loader');
    if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 300); }
  }
  window.addEventListener('load', removeLoader);
  setTimeout(removeLoader, 2000); // fallback
})();
</script>
